name: windows-llvm15-triton-build-from-source

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_SRC_DIR: ${{ github.workspace }}\_deps\triton-src
      Z3_VERSION: "4.12.2"
      CAPSTONE_VERSION: "4.0.2"

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Set TRITON_INSTALL_DIR
        shell: pwsh
        run: |
          "TRITON_INSTALL_DIR=$env:RUNNER_TEMP\triton-install" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "TRITON_INSTALL_DIR=$env:RUNNER_TEMP\triton-install"

      - name: Install LLVM 15 dev (conda-forge llvmdev) + deps
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "lld=15.*" zlib libxml2 cmake ninja
          echo "$CONDA_PREFIX/Library/bin" >> "$GITHUB_PATH"

          LLVM_DIR="$CONDA_PREFIX/Library/lib/cmake/llvm"
          test -d "$LLVM_DIR"
          echo "LLVM_DIR=$LLVM_DIR" >> "$GITHUB_ENV"

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"
          conan profile detect --force

      - name: Conan install deps for titan (fmt/range-v3/z3/capstone/boost)
        shell: pwsh
        run: |
          $jsonPath = Join-Path $env:RUNNER_TEMP "conan-titan-deps.json"

          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -g CMakeDeps `
            -g CMakeToolchain `
            -b missing `
            --format=json | Out-File -FilePath $jsonPath -Encoding utf8

          $j = Get-Content $jsonPath -Raw | ConvertFrom-Json
          if (-not $j.graph -or -not $j.graph.nodes) {
            Write-Host "Conan JSON missing graph.nodes, first 2000 chars:"
            $raw = Get-Content $jsonPath -Raw
            Write-Host $raw.Substring(0, [Math]::Min(2000, $raw.Length))
            throw "Unexpected Conan JSON: missing graph.nodes"
          }

          function Get-PkgFolder([string]$prefix) {
            foreach ($prop in $j.graph.nodes.PSObject.Properties) {
              $node = $prop.Value
              if ($node -and $node.ref -and ($node.ref -like "$prefix*")) {
                if ($node.package_folder)                            { return $node.package_folder }
                if ($node.packageFolder)                             { return $node.packageFolder }
                if ($node.folders -and $node.folders.package_folder) { return $node.folders.package_folder }
                if ($node.folders -and $node.folders.package)        { return $node.folders.package }
              }
            }
            return $null
          }

          $boostFolder = Get-PkgFolder "boost/"
          if (-not $boostFolder) { throw "Failed to resolve boost package folder from Conan JSON" }

          $boostInc = Join-Path $boostFolder "include"
          if (!(Test-Path (Join-Path $boostInc "boost\version.hpp"))) {
            throw "boost/version.hpp not found under $boostInc"
          }

          "BOOST_ROOT=$boostFolder" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "BOOST_ROOT=$boostFolder"

      - name: Install Triton deps (Z3 + Capstone) and export include/lib paths (Conan JSON)
        shell: pwsh
        run: |
          $z3Ref = "z3/${{ env.Z3_VERSION }}"
          $capRef = "capstone/${{ env.CAPSTONE_VERSION }}"
          $jsonPath = Join-Path $env:RUNNER_TEMP "conan-triton-deps.json"

          conan install `
            --requires="$z3Ref" `
            --requires="$capRef" `
            -s build_type=Release `
            -b missing `
            --format=json | Out-File -FilePath $jsonPath -Encoding utf8

          $j = Get-Content $jsonPath -Raw | ConvertFrom-Json
          if (-not $j.graph -or -not $j.graph.nodes) {
            Write-Host "Conan JSON did not include graph.nodes. First 2000 chars:"
            $raw = Get-Content $jsonPath -Raw
            Write-Host $raw.Substring(0, [Math]::Min(2000, $raw.Length))
            throw "Unexpected Conan JSON: missing graph.nodes"
          }

          function Get-PackageFolder([string]$prefix) {
            foreach ($prop in $j.graph.nodes.PSObject.Properties) {
              $node = $prop.Value
              if ($node -and $node.ref -and ($node.ref -like "$prefix*")) {
                if ($node.package_folder) { return $node.package_folder }
                if ($node.packageFolder) { return $node.packageFolder }
                if ($node.folders -and $node.folders.package_folder) { return $node.folders.package_folder }
                if ($node.folders -and $node.folders.package) { return $node.folders.package }
              }
            }
            return $null
          }

          # ---- Z3 ----
          $z3Folder = Get-PackageFolder "z3/"
          if (-not $z3Folder) { throw "Failed to resolve z3 package folder from Conan JSON" }

          $z3Inc = Join-Path $z3Folder "include"
          $z3LibDir = Join-Path $z3Folder "lib"
          if (!(Test-Path (Join-Path $z3Inc "z3.h"))) { throw "z3.h not found under $z3Inc" }

          $z3Lib = Get-ChildItem -Path $z3LibDir -Filter "*.lib" -File -ErrorAction SilentlyContinue |
                   Where-Object { $_.Name -match 'z3' } |
                   Select-Object -First 1
          if (-not $z3Lib) { throw "No z3 .lib found under $z3LibDir" }

          "Z3_INCLUDE_DIR=$z3Inc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Z3_LIBRARY=$($z3Lib.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host ("Z3_INCLUDE_DIR={0}" -f $z3Inc)
          Write-Host ("Z3_LIBRARY={0}" -f $z3Lib.FullName)

          # ---- Capstone ----
          # capstone 4.x 头文件在 include/capstone/capstone.h，传 include/ 给 Triton
          $capFolder = Get-PackageFolder "capstone/"
          if (-not $capFolder) { throw "Failed to resolve capstone package folder from Conan JSON" }

          $capInc = Join-Path $capFolder "include"
          $capLibDir = Join-Path $capFolder "lib"

          if (!(Test-Path (Join-Path $capInc "capstone\capstone.h"))) {
            throw "capstone/capstone.h not found under $capInc"
          }

          $capLib = Get-ChildItem -Path $capLibDir -Filter "*.lib" -File -ErrorAction SilentlyContinue |
                    Where-Object { $_.Name -match 'capstone|cs' } |
                    Select-Object -First 1
          if (-not $capLib) { throw "No capstone .lib found under $capLibDir" }

          "CAPSTONE_INCLUDE_DIR=$capInc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CAPSTONE_LIBRARY=$($capLib.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host ("CAPSTONE_INCLUDE_DIR={0}" -f $capInc)
          Write-Host ("CAPSTONE_LIBRARY={0}" -f $capLib.FullName)

      - name: Clone Triton source
        shell: pwsh
        run: |
          if (Test-Path "_deps\triton-src") { Remove-Item -Recurse -Force "_deps\triton-src" }
          git clone https://github.com/JonathanSalwan/Triton "_deps\triton-src"
          git -C "_deps\triton-src" checkout "v0.9"
          git -C "_deps\triton-src" rev-parse HEAD

      # ★ 关键修复：在 configure 之前，先查看 Triton v0.9 CMakeLists 里真正的
      #   Python 开关变量名，然后用全量 OFF 确保不编译任何 Python 绑定
      - name: Patch Triton CMakeLists to force-disable Python bindings
        shell: pwsh
        run: |
          $cml = "_deps\triton-src\src\libtriton\CMakeLists.txt"
          $content = Get-Content $cml -Raw

          # 找出所有涉及 PYTHON 的 option/set 行，输出供调试
          Write-Host "=== Triton Python-related CMake variables ==="
          $content -split "`n" | Where-Object { $_ -match 'PYTHON|python' } | ForEach-Object { Write-Host $_ }
          Write-Host "============================================="

          # 直接在源码顶层 CMakeLists 里强制 set 所有已知变量
          $topCml = "_deps\triton-src\CMakeLists.txt"
          $topContent = Get-Content $topCml -Raw

          # 在 project() 行之后插入强制关闭语句
          $inject = @"

          # ---- injected by CI: disable all Python bindings ----
          set(PYTHON_BINDINGS         OFF CACHE BOOL "" FORCE)
          set(WITH_PYTHON_BINDINGS    OFF CACHE BOOL "" FORCE)
          set(TRITON_BUILD_PYTHON_BINDINGS OFF CACHE BOOL "" FORCE)
          # -------------------------------------------------------
          "@
          # 找到 project( 行并在其后插入
          $topContent = $topContent -replace '(project\([^\)]*\))', "`$1`n$inject"
          Set-Content $topCml $topContent -Encoding utf8
          Write-Host "Patched $topCml"

      - name: Configure Triton (MSVC; explicit Z3+Capstone; LLVM from conda)
        shell: pwsh
        run: |
          $src = "_deps\triton-src"
          $bld = "_deps\triton-build"
          $inst = "$env:TRITON_INSTALL_DIR"

          cmake -S $src -B $bld -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_INSTALL_PREFIX="$inst" `
            -DLLVM_DIR="$env:LLVM_DIR" `
            -DZ3_INCLUDE_DIR="$env:Z3_INCLUDE_DIR" `
            -DZ3_LIBRARY="$env:Z3_LIBRARY" `
            -DCAPSTONE_INCLUDE_DIR="$env:CAPSTONE_INCLUDE_DIR" `
            -DCAPSTONE_LIBRARY="$env:CAPSTONE_LIBRARY" `
            -DBOOST_ROOT="$env:BOOST_ROOT" `
            -DBoost_NO_SYSTEM_PATHS=ON `
            -DPYTHON_BINDINGS=OFF `
            -DWITH_PYTHON_BINDINGS=OFF `
            -DTRITON_BUILD_PYTHON_BINDINGS=OFF `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build & install Triton
        shell: pwsh
        run: |
          cmake --build "_deps\triton-build" --config Release --parallel
          cmake --install "_deps\triton-build" --config Release
          if (!(Test-Path "$env:TRITON_INSTALL_DIR\lib\cmake\triton\tritonConfig.cmake")) {
            throw "tritonConfig.cmake not found after install"
          }

      - name: Configure titan (CMake)
        shell: pwsh
        run: |
          # Find conan_toolchain.cmake wherever Conan 2 placed it
          $toolchain = Get-ChildItem -Path "$env:BUILD_DIR\conan" -Filter "conan_toolchain.cmake" -Recurse -ErrorAction Stop |
                       Select-Object -First 1
          if (-not $toolchain) { throw "conan_toolchain.cmake not found under $env:BUILD_DIR\conan" }
          $conanGen = $toolchain.DirectoryName

          $prefixPath = "$conanGen;$env:CONDA_PREFIX\Library;$env:TRITON_INSTALL_DIR"

          cmake -S . -B "$env:BUILD_DIR" -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DCMAKE_PREFIX_PATH="$prefixPath" `
            -DLLVM_DIR="$env:LLVM_DIR" `
            -Dtriton_DIR="$env:TRITON_INSTALL_DIR\lib\cmake\triton" `
            -DTITAN_BUILD_INTRINSICS=OFF `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build titan.exe (Release)
        shell: pwsh
        run: |
          cmake --build "$env:BUILD_DIR" --config Release --target titan --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
