name: windows-llvm15-triton-prebuilt

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_URL: https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z
      TRITON_DIR: ${{ github.workspace }}\_deps\triton
      TRITON_SRC_DIR: ${{ github.workspace }}\_deps\triton-src
      TRITON_GEN_DIR: ${{ github.workspace }}\_deps\triton-generated

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install tools (7zip)
        shell: pwsh
        run: |
          choco install -y 7zip

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 15 (conda, llvmdev)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "clang=15.*" "lld=15.*"
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          test -n "${CONDA_PREFIX:-}"

          # On conda-forge Windows, executables are typically in $CONDA_PREFIX/Library/bin
          if [ -d "$CONDA_PREFIX/Library/bin" ]; then
            echo "$CONDA_PREFIX/Library/bin" >> "$GITHUB_PATH"
          fi

      - name: Export LLVM_DIR (find LLVMConfig.cmake in conda env)
        shell: pwsh
        run: |
          if (-not $env:CONDA_PREFIX) { throw "CONDA_PREFIX is not set" }

          $cfg = Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) { throw "LLVMConfig.cmake not found under $env:CONDA_PREFIX" }

          "LLVM_DIR=$($cfg.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "LLVM_DIR=$($cfg.Directory.FullName)"

      - name: Download & extract Triton prebuilt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "_deps" | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP "triton.7z"
          Invoke-WebRequest -Uri "${{ env.TRITON_URL }}" -OutFile $archive
          New-Item -ItemType Directory -Force "${{ env.TRITON_DIR }}" | Out-Null
          & 7z x $archive "-o${{ env.TRITON_DIR }}" -y

          Write-Host "Triton extracted to ${{ env.TRITON_DIR }}"
          Get-ChildItem -Force -Recurse -Depth 3 "${{ env.TRITON_DIR }}" | Select-Object FullName

      - name: Clone Triton headers (source)
        shell: pwsh
        run: |
          if (Test-Path "${{ env.TRITON_SRC_DIR }}") { Remove-Item -Recurse -Force "${{ env.TRITON_SRC_DIR }}" }
          git clone --depth 1 https://github.com/JonathanSalwan/Triton "${{ env.TRITON_SRC_DIR }}"
          git -C "${{ env.TRITON_SRC_DIR }}" rev-parse HEAD

          $hdrRoot = Join-Path "${{ env.TRITON_SRC_DIR }}" "src\libtriton\includes"
          if (!(Test-Path (Join-Path $hdrRoot "triton"))) { throw "Expected headers not found under: $hdrRoot" }

      - name: Create Triton CMake package shim (tritonConfig.cmake)
        shell: pwsh
        run: |
          $binRoot = "${{ env.TRITON_DIR }}"
          $srcRoot = "${{ env.TRITON_SRC_DIR }}"
          $genRoot = "${{ env.TRITON_GEN_DIR }}"

          # Generate minimal triton/config.hpp (Triton headers include it, but it is normally generated by Triton build)
          $cfgDir = Join-Path $genRoot "triton"
          New-Item -ItemType Directory -Force $cfgDir | Out-Null
          $cfgPath = Join-Path $cfgDir "config.hpp"

          @"
          #ifndef TRITON_CONFIG_HPP
          #define TRITON_CONFIG_HPP
          #if defined(_WIN32) && defined(TRITON_SHARED)
          #  if defined(TRITON_BUILDING_SHARED)
          #    define TRITON_EXPORT __declspec(dllexport)
          #  else
          #    define TRITON_EXPORT __declspec(dllimport)
          #  endif
          #else
          #  define TRITON_EXPORT
          #endif
          #endif
          "@ | Set-Content -Path $cfgPath -Encoding UTF8

          $includeGit = Join-Path $srcRoot "src\libtriton\includes"
          $includeGen = $genRoot

          # find Triton import library in the prebuilt archive
          $lib = Get-ChildItem -Path $binRoot -Recurse -Filter "triton*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $lib) { $lib = Get-ChildItem -Path $binRoot -Recurse -Filter "*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1 }
          if (-not $lib) { throw "No import library (.lib) found under $binRoot" }

          $shimDir = Join-Path $env:RUNNER_TEMP "triton-cmake"
          New-Item -ItemType Directory -Force $shimDir | Out-Null

          $cmakeCfg = Join-Path $shimDir "tritonConfig.cmake"
          $inc1 = $includeGen.Replace('\','/')
          $inc2 = $includeGit.Replace('\','/')
          $libPath = $lib.FullName.Replace('\','/')

          @"
          set(triton_FOUND TRUE)
          if(NOT TARGET triton::triton)
            add_library(triton::triton UNKNOWN IMPORTED)
            set_target_properties(triton::triton PROPERTIES
              IMPORTED_LOCATION "$libPath"
              INTERFACE_INCLUDE_DIRECTORIES "$inc1;$inc2"
            )
          endif()
          "@ | Set-Content -Path $cmakeCfg -Encoding UTF8

          "triton_DIR=$($shimDir)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "triton_DIR=$shimDir"
          Write-Host "Generated $cmakeCfg"

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Conan profile detect
        shell: pwsh
        run: |
          conan profile detect --force

      - name: Conan install deps (fmt/range-v3/z3/capstone)
        shell: pwsh
        run: |
          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -b missing

      - name: Configure (CMake)
        shell: pwsh
        run: |
          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"

          cmake -S . -B $env:BUILD_DIR `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DCMAKE_PREFIX_PATH="$($conanGen.Path)" `
            -DLLVM_DIR="$env:LLVM_DIR" `
            -Dtriton_DIR="$env:triton_DIR"

      - name: Build titan.exe (skip intrinsics on Windows)
        shell: pwsh
        run: |
          cmake --build $env:BUILD_DIR --config Release --target titan --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
