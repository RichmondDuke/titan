name: windows-llvm15-triton-prebuilt

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_URL: https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z
      TRITON_DIR: ${{ github.workspace }}\_deps\triton

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install tools (7zip)
        shell: pwsh
        run: |
          choco install -y 7zip

      # LLVM 15 via Conda (conda-forge), which includes lib/cmake/llvm/LLVMConfig.cmake
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict
          use-mamba: true

      - name: Install LLVM 15 (conda-forge)
        shell: pwsh
        run: |
          mamba install -y llvm=15.* clang=15.* lld=15.*

      - name: Locate LLVMConfig.cmake (from conda)
        shell: pwsh
        run: |
          # CONDA_PREFIX is set by setup-miniconda
          if (-not $env:CONDA_PREFIX) { throw "CONDA_PREFIX is not set" }

          $cfg = Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) {
            Write-Host "Listing conda env root (depth 4):"
            Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Depth 4 | Select-Object FullName
            throw "LLVMConfig.cmake not found under CONDA_PREFIX=$env:CONDA_PREFIX"
          }

          $llvmDir = $cfg.Directory.FullName
          Write-Host "Found LLVMConfig.cmake at: $($cfg.FullName)"
          Write-Host "Using LLVM_DIR=$llvmDir"
          "LLVM_DIR=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Ensure conda bin is on PATH for clang.exe
          $condaBin = Join-Path $env:CONDA_PREFIX "Library\bin"
          if (Test-Path $condaBin) {
            Write-Host "Adding conda LLVM bin to PATH: $condaBin"
            $condaBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Download & extract Triton prebuilt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "_deps" | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP "triton.7z"
          Invoke-WebRequest -Uri "${{ env.TRITON_URL }}" -OutFile $archive
          New-Item -ItemType Directory -Force "${{ env.TRITON_DIR }}" | Out-Null
          & 7z x $archive "-o${{ env.TRITON_DIR }}" -y

          Write-Host "Triton extracted to ${{ env.TRITON_DIR }}"
          Get-ChildItem -Recurse -Depth 3 "${{ env.TRITON_DIR }}" | Select-Object FullName

      # Conan deps for fmt/range-v3/z3/capstone (binary when available)
      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Conan profile detect
        shell: pwsh
        run: |
          conan profile detect --force

      - name: Conan install deps (fmt/range-v3/z3/capstone)
        shell: pwsh
        run: |
          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -b missing

      - name: Debug -> list Conan output folder
        shell: pwsh
        run: |
          Write-Host "Listing $env:BUILD_DIR\conan"
          Get-ChildItem -Force -Recurse "$env:BUILD_DIR\conan" | Select-Object FullName

      - name: Configure (CMake)
        shell: pwsh
        run: |
          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"

          cmake -S . -B $env:BUILD_DIR `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DCMAKE_PREFIX_PATH="$conanGen" `
            -DLLVM_DIR="$env:LLVM_DIR" `
            -DTRITON_ROOT="${{ env.TRITON_DIR }}"

      - name: Build titan.exe
        shell: pwsh
        run: |
          cmake --build $env:BUILD_DIR --config Release --parallel

      - name: Generate vmprotect64.ll (intrinsics)
        shell: pwsh
        run: |
          $clang = Get-Command clang.exe -ErrorAction SilentlyContinue
          if (-not $clang) { throw "clang.exe not found in PATH" }

          Write-Host "Using clang: $($clang.Source)"

          Push-Location intrinsics
          & $clang.Source `
            -std=c++17 `
            -O3 `
            -Iremill/include `
            -Wno-gnu-inline-cpp-without-extern `
            -fno-discard-value-names `
            -fstrict-aliasing `
            -fno-slp-vectorize `
            -mllvm -enable-tbaa=true `
            -emit-llvm `
            -DADDRESS_SIZE_BITS=64 `
            -m64 `
            -S main.cpp `
            -o vmprotect64.ll
          Pop-Location

      - name: Add Triton bin to PATH (best-effort)
        shell: pwsh
        run: |
          $binCandidates = @(
            Join-Path "${{ env.TRITON_DIR }}" "bin"
            Join-Path "${{ env.TRITON_DIR }}" "lib"
          )
          foreach ($p in $binCandidates) {
            if (Test-Path $p) {
              echo $p | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
            intrinsics/vmprotect64.ll
