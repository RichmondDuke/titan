name: windows-llvm15-triton-prebuilt

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_URL: https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z
      TRITON_DIR: ${{ github.workspace }}\_deps\triton

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install tools (7zip)
        shell: pwsh
        run: |
          choco install -y 7zip

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 15 (conda, llvmdev)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "clang=15.*" "lld=15.*"
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          test -n "${CONDA_PREFIX:-}"

      - name: Export LLVM_DIR (find LLVMConfig.cmake in conda env)
        shell: pwsh
        run: |
          if (-not $env:CONDA_PREFIX) { throw "CONDA_PREFIX is not set" }

          $condaBin = Join-Path $env:CONDA_PREFIX "Library\bin"
          if (Test-Path $condaBin) {
            $condaBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          $cfg = Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) { throw "LLVMConfig.cmake not found under $env:CONDA_PREFIX" }

          "LLVM_DIR=$($cfg.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "LLVM_DIR=$($cfg.Directory.FullName)"

      - name: Download & extract Triton prebuilt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "_deps" | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP "triton.7z"
          Invoke-WebRequest -Uri "${{ env.TRITON_URL }}" -OutFile $archive
          New-Item -ItemType Directory -Force "${{ env.TRITON_DIR }}" | Out-Null
          & 7z x $archive "-o${{ env.TRITON_DIR }}" -y

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Conan profile detect
        shell: pwsh
        run: |
          conan profile detect --force

      - name: Conan install deps (fmt/range-v3/z3/capstone)
        shell: pwsh
        run: |
          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -g CMakeDeps `
            -g CMakeToolchain `
            -g VirtualBuildEnv `
            -g VirtualRunEnv `
            -b missing

      - name: Configure (CMake) with Conan virtual env
        shell: pwsh
        run: |
          $conanFolder = Resolve-Path "$env:BUILD_DIR\conan"
          $conanBuildBat = Join-Path $conanFolder "conanbuild.bat"
          if (!(Test-Path $conanBuildBat)) {
            throw "Expected Conan VirtualBuildEnv at $conanBuildBat"
          }

          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"

          $tritonRoot = "${{ env.TRITON_DIR }}".Replace('\','/')
          $llvmDir = "$env:LLVM_DIR".Replace('\','/')

          cmd /c "call `"$conanBuildBat`" && cmake -S . -B `"$env:BUILD_DIR`" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=`"$toolchain`" -DCMAKE_PREFIX_PATH=`"$($conanGen.Path)`" -DLLVM_DIR=`"$llvmDir`" -DTRITON_ROOT=`"$tritonRoot`""

      - name: Build titan.exe with Conan virtual env
        shell: pwsh
        run: |
          $conanFolder = Resolve-Path "$env:BUILD_DIR\conan"
          $conanBuildBat = Join-Path $conanFolder "conanbuild.bat"
          if (!(Test-Path $conanBuildBat)) {
            throw "Expected Conan VirtualBuildEnv at $conanBuildBat"
          }

          cmd /c "call `"$conanBuildBat`" && cmake --build `"$env:BUILD_DIR`" --config Release --parallel"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
