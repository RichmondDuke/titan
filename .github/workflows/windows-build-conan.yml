name: windows-llvm15-triton-prebuilt

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_URL: https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z
      TRITON_DIR: ${{ github.workspace }}\_deps\triton

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install tools (7zip)
        shell: pwsh
        run: |
          choco install -y 7zip

      # LLVM 15 via Conda (conda-forge) to ensure LLVMConfig.cmake exists
      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 15 (conda)
        shell: bash -l {0}
        run: |
          conda info
          conda install -y "llvm=15.*" "clang=15.*" "lld=15.*"

      - name: Locate LLVMConfig.cmake (from conda)
        shell: bash -l {0}
        run: |
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          if [ -z "$CONDA_PREFIX" ]; then
            echo "CONDA_PREFIX is empty"
            exit 1
          fi

          # NOTE: Keep the python -c as a SINGLE LINE without newline indentation,
          # otherwise Python can throw IndentationError.
          LLVM_CONFIG_DIR="$(python - <<'PY'
            import os, sys
            root = os.environ["CONDA_PREFIX"]
            for dirpath, dirnames, filenames in os.walk(root):
              if "LLVMConfig.cmake" in filenames:
                print(dirpath)
                sys.exit(0)
            sys.exit(2)
          PY
          )"

          if [ -z "$LLVM_CONFIG_DIR" ]; then
            echo "LLVMConfig.cmake not found under $CONDA_PREFIX"
            exit 1
          fi

          echo "Found LLVM_DIR=$LLVM_CONFIG_DIR"
          echo "LLVM_DIR=$LLVM_CONFIG_DIR" >> "$GITHUB_ENV"

          # On conda-forge Windows, executables are typically in $CONDA_PREFIX/Library/bin
          if [ -d "$CONDA_PREFIX/Library/bin" ]; then
            echo "$CONDA_PREFIX/Library/bin" >> "$GITHUB_PATH"
          fi

      - name: Download & extract Triton prebuilt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "_deps" | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP "triton.7z"
          Invoke-WebRequest -Uri "${{ env.TRITON_URL }}" -OutFile $archive
          New-Item -ItemType Directory -Force "${{ env.TRITON_DIR }}" | Out-Null
          & 7z x $archive "-o${{ env.TRITON_DIR }}" -y

          Write-Host "Triton extracted to ${{ env.TRITON_DIR }}"
          Get-ChildItem -Recurse -Depth 3 "${{ env.TRITON_DIR }}" | Select-Object FullName

      # Conan deps for fmt/range-v3/z3/capstone (binary when available)
      - name: Install Conan 2
        shell: bash -l {0}
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Conan profile detect
        shell: bash -l {0}
        run: |
          conan profile detect --force

      - name: Conan install deps (fmt/range-v3/z3/capstone)
        shell: bash -l {0}
        run: |
          conan install . \
            -of "${BUILD_DIR}/conan" \
            -s build_type=Release \
            -s compiler.cppstd=20 \
            -b missing

      - name: Configure (CMake)
        shell: pwsh
        run: |
          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"

          cmake -S . -B $env:BUILD_DIR `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DCMAKE_PREFIX_PATH="$conanGen" `
            -DLLVM_DIR="$env:LLVM_DIR" `
            -DTRITON_ROOT="${{ env.TRITON_DIR }}"

      - name: Build titan.exe
        shell: pwsh
        run: |
          cmake --build $env:BUILD_DIR --config Release --parallel

      - name: Generate vmprotect64.ll (intrinsics)
        shell: pwsh
        run: |
          $clang = Get-Command clang.exe -ErrorAction SilentlyContinue
          if (-not $clang) { throw "clang.exe not found in PATH" }

          Write-Host "Using clang: $($clang.Source)"

          Push-Location intrinsics
          & $clang.Source `
            -std=c++17 `
            -O3 `
            -Iremill/include `
            -Wno-gnu-inline-cpp-without-extern `
            -fno-discard-value-names `
            -fstrict-aliasing `
            -fno-slp-vectorize `
            -mllvm -enable-tbaa=true `
            -emit-llvm `
            -DADDRESS_SIZE_BITS=64 `
            -m64 `
            -S main.cpp `
            -o vmprotect64.ll
          Pop-Location

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
            intrinsics/vmprotect64.ll
