name: windows-llvm15-triton-build-from-source

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_SRC_DIR: ${{ github.workspace }}\_deps\triton-src
      Z3_VERSION: "4.12.2"

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Set TRITON_INSTALL_DIR
        shell: pwsh
        run: |
          "TRITON_INSTALL_DIR=$env:RUNNER_TEMP\triton-install" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "TRITON_INSTALL_DIR=$env:RUNNER_TEMP\triton-install"

      - name: Install LLVM 15 dev (conda-forge llvmdev) + deps
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "lld=15.*" zlib libxml2 cmake ninja
          echo "$CONDA_PREFIX/Library/bin" >> "$GITHUB_PATH"
          LLVM_DIR="$CONDA_PREFIX/Library/lib/cmake/llvm"
          test -d "$LLVM_DIR"
          echo "LLVM_DIR=$LLVM_DIR" >> "$GITHUB_ENV"

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"
          conan profile detect --force

      - name: Conan install deps for titan (fmt/range-v3/z3/capstone)
        shell: pwsh
        run: |
          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -g CMakeDeps `
            -g CMakeToolchain `
            -b missing

      - name: Install Z3 for Triton and export package_folder (Conan JSON)
        shell: pwsh
        run: |
          $ref = "z3/${{ env.Z3_VERSION }}"

          $jsonPath = Join-Path $env:RUNNER_TEMP "conan-z3.json"

          # Install Z3 and ask Conan for machine-readable output containing the resolved package folder
          conan install --requires="$ref" -s build_type=Release -b missing --format=json | Out-File -FilePath $jsonPath -Encoding utf8

          $j = Get-Content $jsonPath -Raw | ConvertFrom-Json

          # Conan 2 JSON structure: try several known shapes (it has changed across versions).
          $pkgFolder = $null

          # Shape A: j.graph.nodes[]
          if ($j.graph -and $j.graph.nodes) {
            foreach ($n in $j.graph.nodes) {
              if ($n.ref -like "z3/*") {
                if ($n.package_folder) { $pkgFolder = $n.package_folder; break }
                if ($n.packageFolder) { $pkgFolder = $n.packageFolder; break }
              }
            }
          }

          # Shape B: j.nodes[]
          if (-not $pkgFolder -and $j.nodes) {
            foreach ($n in $j.nodes) {
              if ($n.ref -like "z3/*") {
                if ($n.package_folder) { $pkgFolder = $n.package_folder; break }
                if ($n.packageFolder) { $pkgFolder = $n.packageFolder; break }
              }
            }
          }

          if (-not $pkgFolder) {
            Write-Host "Could not find z3 package_folder in Conan JSON. Dumping first 2000 chars:"
            $raw = Get-Content $jsonPath -Raw
            Write-Host $raw.Substring(0, [Math]::Min(2000, $raw.Length))
            throw "Failed to locate z3 package_folder from Conan JSON output"
          }

          if (!(Test-Path $pkgFolder)) { throw "Resolved package_folder does not exist: $pkgFolder" }

          $inc = Join-Path $pkgFolder "include"
          $libDir = Join-Path $pkgFolder "lib"

          if (!(Test-Path (Join-Path $inc "z3.h"))) {
            Write-Host ("Listing include dir {0}:" -f $inc)
            Get-ChildItem -Force -Path $inc -ErrorAction SilentlyContinue | Select-Object FullName
            throw "Expected z3.h not found under $inc"
          }

          $lib = Get-ChildItem -Path $libDir -Filter "*.lib" -File -ErrorAction SilentlyContinue |
                 Where-Object { $_.Name -match 'z3' } |
                 Select-Object -First 1

          if (-not $lib) {
            Write-Host ("Listing lib dir {0}:" -f $libDir)
            Get-ChildItem -Force -Path $libDir -ErrorAction SilentlyContinue | Select-Object FullName
            throw "No z3-related .lib found under $libDir"
          }

          "Z3_INCLUDE_DIR=$inc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Z3_LIBRARY=$($lib.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host ("Z3 package_folder: {0}" -f $pkgFolder)
          Write-Host ("Z3_INCLUDE_DIR={0}" -f $inc)
          Write-Host ("Z3_LIBRARY={0}" -f $lib.FullName)

      - name: Clone Triton source
        shell: pwsh
        run: |
          if (Test-Path "_deps\triton-src") { Remove-Item -Recurse -Force "_deps\triton-src" }
          git clone https://github.com/JonathanSalwan/Triton "_deps\triton-src"
          git -C "_deps\triton-src" checkout "v0.9"
          git -C "_deps\triton-src" rev-parse HEAD

      - name: Configure Triton (MSVC; explicit Z3; LLVM from conda)
        shell: pwsh
        run: |
          $src = "_deps\triton-src"
          $bld = "_deps\triton-build"
          $inst = "$env:TRITON_INSTALL_DIR"

          cmake -S $src -B $bld -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_INSTALL_PREFIX="$inst" `
            -DLLVM_DIR="$env:LLVM_DIR" `
            -DZ3_INCLUDE_DIR="$env:Z3_INCLUDE_DIR" `
            -DZ3_LIBRARY="$env:Z3_LIBRARY" `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build & install Triton
        shell: pwsh
        run: |
          cmake --build "_deps\triton-build" --config Release --parallel
          cmake --install "_deps\triton-build" --config Release
          if (!(Test-Path "$env:TRITON_INSTALL_DIR\lib\cmake\triton\tritonConfig.cmake")) {
            throw "tritonConfig.cmake not found after install"
          }

      - name: Configure titan (CMake)
        shell: pwsh
        run: |
          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"
          $prefixPath = "$($conanGen.Path);$env:CONDA_PREFIX\Library;$env:TRITON_INSTALL_DIR"

          cmake -S . -B "$env:BUILD_DIR" -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DCMAKE_PREFIX_PATH="$prefixPath" `
            -DLLVM_DIR="$env:LLVM_DIR" `
            -Dtriton_DIR="$env:TRITON_INSTALL_DIR\lib\cmake\triton" `
            -DTITAN_BUILD_INTRINSICS=OFF `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build titan.exe (Release)
        shell: pwsh
        run: |
          cmake --build "$env:BUILD_DIR" --config Release --target titan --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
