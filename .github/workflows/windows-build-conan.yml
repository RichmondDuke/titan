name: windows-llvm15-triton-prebuilt

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_URL: https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z
      TRITON_DIR: ${{ github.workspace }}\_deps\triton

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install tools (7zip)
        shell: pwsh
        run: |
          choco install -y 7zip

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 15 (conda, llvmdev)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "clang=15.*" "lld=15.*"
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          test -n "${CONDA_PREFIX:-}"
          if [ -d "$CONDA_PREFIX/Library/bin" ]; then
            echo "$CONDA_PREFIX/Library/bin" >> "$GITHUB_PATH"
          fi

      - name: Export LLVM_DIR (find LLVMConfig.cmake in conda env)
        shell: pwsh
        run: |
          if (-not $env:CONDA_PREFIX) { throw "CONDA_PREFIX is not set" }

          $cfg = Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) { throw "LLVMConfig.cmake not found under $env:CONDA_PREFIX" }

          "LLVM_DIR=$($cfg.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "LLVM_DIR=$($cfg.Directory.FullName)"

      - name: Download & extract Triton prebuilt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "_deps" | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP "triton.7z"
          Invoke-WebRequest -Uri "${{ env.TRITON_URL }}" -OutFile $archive
          New-Item -ItemType Directory -Force "${{ env.TRITON_DIR }}" | Out-Null
          & 7z x $archive "-o${{ env.TRITON_DIR }}" -y

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Conan profile detect
        shell: pwsh
        run: |
          conan profile detect --force

      - name: Conan install deps (fmt/range-v3/z3/capstone) + VirtualBuildEnv
        shell: pwsh
        run: |
          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -g CMakeDeps `
            -g CMakeToolchain `
            -g VirtualBuildEnv `
            -g VirtualRunEnv `
            -b missing

      - name: Locate Conan virtual env script
        shell: pwsh
        run: |
          $root = Resolve-Path "$env:BUILD_DIR\conan"

          $bat = Get-ChildItem -Path $root -Recurse -Filter "conanbuild.bat" -ErrorAction SilentlyContinue | Select-Object -First 1
          $ps1 = Get-ChildItem -Path $root -Recurse -Filter "conanbuild.ps1" -ErrorAction SilentlyContinue | Select-Object -First 1

          if ($bat) {
            "CONANBUILD_SCRIPT=$($bat.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CONANBUILD_KIND=bat" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Found conanbuild.bat: $($bat.FullName)"
            exit 0
          }

          if ($ps1) {
            "CONANBUILD_SCRIPT=$($ps1.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "CONANBUILD_KIND=ps1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Found conanbuild.ps1: $($ps1.FullName)"
            exit 0
          }

          Write-Host "ERROR: conanbuild script not found under $root"
          Write-Host "Debug: top-level entries:"
          Get-ChildItem -Force $root | Select-Object FullName
          Write-Host "Debug: generators entries:"
          if (Test-Path (Join-Path $root "build\generators")) {
            Get-ChildItem -Force (Join-Path $root "build\generators") | Select-Object FullName
          }
          throw "Expected Conan VirtualBuildEnv script (conanbuild.bat/ps1) was not generated."

      - name: Configure (CMake) with Conan virtual env
        shell: pwsh
        run: |
          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"

          if ($env:CONANBUILD_KIND -eq "bat") {
            cmd /c "call `"$env:`](#)
