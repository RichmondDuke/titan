name: windows-llvm15-triton-build-from-source

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_SRC_DIR: ${{ github.workspace }}\_deps\triton-src

    steps:


      - name: Set TRITON_INSTALL_DIR
        shell: pwsh
        run: |
          "TRITON_INSTALL_DIR=$env:RUNNER_TEMP\triton-install" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
           Write-Host "TRITON_INSTALL_DIR=$env:RUNNER_TEMP\triton-install"
    
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 15 dev (conda-forge llvmdev)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "clang=15.*" "lld=15.*" zlib libxml2 cmake ninja
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          test -n "${CONDA_PREFIX:-}"
          echo "$CONDA_PREFIX/Library/bin" >> "$GITHUB_PATH"

      - name: Export LLVM_DIR (conda)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          LLVM_DIR="$CONDA_PREFIX/Library/lib/cmake/llvm"
          test -d "$LLVM_DIR"
          echo "LLVM_DIR=$LLVM_DIR" >> "$GITHUB_ENV"

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: bash -l {0}
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"
          conan profile detect --force

      - name: Conan install deps (fmt/range-v3/z3/capstone)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conan install . \
            -of "${BUILD_DIR}/conan" \
            -s build_type=Release \
            -s compiler.cppstd=20 \
            -g CMakeDeps \
            -g CMakeToolchain \
            -b missing

      - name: Clone Triton source
        shell: bash -l {0}
        run: |
          set -euo pipefail
          rm -rf "_deps/triton-src"
          git clone https://github.com/JonathanSalwan/Triton "_deps/triton-src"
          cd "_deps/triton-src"
          # Prefer tag v0.9; if it doesn't exist, this will fail and you can pin a commit instead.
          git checkout "v0.9"
          git rev-parse HEAD

      - name: Build & install Triton
        shell: bash -l {0}
        run: |
          set -euo pipefail
          cmake -S "_deps/triton-src" -B "_deps/triton-build" \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${TRITON_INSTALL_DIR}" \
            -DLLVM_DIR="${LLVM_DIR}"

          cmake --build "_deps/triton-build" --config Release --parallel
          cmake --install "_deps/triton-build" --config Release

          test -f "${TRITON_INSTALL_DIR}/lib/cmake/triton/tritonConfig.cmake"

      - name: Configure titan (CMake)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          CONAN_GEN="${BUILD_DIR}/conan/build/generators"

          cmake -S . -B "${BUILD_DIR}" \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${CONAN_GEN}/conan_toolchain.cmake" \
            -DCMAKE_PREFIX_PATH="${CONAN_GEN};${CONDA_PREFIX}/Library;${TRITON_INSTALL_DIR}" \
            -DLLVM_DIR="${LLVM_DIR}" \
            -Dtriton_DIR="${TRITON_INSTALL_DIR}/lib/cmake/triton" \
            -DTITAN_BUILD_INTRINSICS=OFF

      - name: Build titan.exe
        shell: bash -l {0}
        run: |
          set -euo pipefail
          cmake --build "${BUILD_DIR}" --config Release --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
