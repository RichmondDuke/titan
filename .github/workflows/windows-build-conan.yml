name: windows-llvm15-triton-headers-from-git

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_BIN_URL: https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z
      TRITON_BIN_DIR: ${{ github.workspace }}\_deps\triton-bin
      TRITON_SRC_DIR: ${{ github.workspace }}\_deps\triton-src

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 15 dev (conda-forge llvmdev)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "clang=15.*" "lld=15.*" zlib libxml2
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          test -n "${CONDA_PREFIX:-}"

      - name: Export LLVM_DIR (find LLVMConfig.cmake in conda env)
        shell: pwsh
        run: |
          if (-not $env:CONDA_PREFIX) { throw "CONDA_PREFIX is not set" }

          $condaBin = Join-Path $env:CONDA_PREFIX "Library\bin"
          if (Test-Path $condaBin) {
            $condaBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          $cfg = Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) { throw "LLVMConfig.cmake not found under $env:CONDA_PREFIX" }

          "LLVM_DIR=$($cfg.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install tools (7zip)
        shell: pwsh
        run: |
          choco install -y 7zip

      - name: Download & extract Triton prebuilt (lib/bin)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "_deps" | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP "triton.7z"
          Invoke-WebRequest -Uri "${{ env.TRITON_BIN_URL }}" -OutFile $archive
          New-Item -ItemType Directory -Force "${{ env.TRITON_BIN_DIR }}" | Out-Null
          & 7z x $archive "-o${{ env.TRITON_BIN_DIR }}" -y

          Write-Host "Triton bin extracted to ${{ env.TRITON_BIN_DIR }}"
          Get-ChildItem -Force -Recurse -Depth 4 "${{ env.TRITON_BIN_DIR }}" | Select-Object FullName

      - name: Clone Triton source (headers)
        shell: pwsh
        run: |
          if (Test-Path "${{ env.TRITON_SRC_DIR }}") { Remove-Item -Recurse -Force "${{ env.TRITON_SRC_DIR }}" }

          git clone https://github.com/JonathanSalwan/Triton "${{ env.TRITON_SRC_DIR }}"
          git -C "${{ env.TRITON_SRC_DIR }}" rev-parse HEAD

          $hdrRoot = Join-Path "${{ env.TRITON_SRC_DIR }}" "src\libtriton\includes"
          $hdrCheck = Join-Path $hdrRoot "triton"
          if (!(Test-Path $hdrCheck)) {
            throw "Expected headers not found: $hdrCheck"
          }

          Write-Host "Triton header root: $hdrRoot"

      - name: Generate tritonConfig.cmake shim (headers from git, lib from 7z)
        shell: pwsh
        run: |
          $srcRoot = "${{ env.TRITON_SRC_DIR }}"
          $binRoot = "${{ env.TRITON_BIN_DIR }}"

          $includeDir = Join-Path $srcRoot "src\libtriton\includes"
          if (!(Test-Path (Join-Path $includeDir "triton"))) {
            throw "Include directory does not contain 'triton' folder: $includeDir"
          }

          $lib = Get-ChildItem -Path $binRoot -Recurse -Filter "triton*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $lib) {
            $lib = Get-ChildItem -Path $binRoot -Recurse -Filter "*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $lib) {
            throw "No import library (.lib) found in Triton prebuilt archive."
          }

          Write-Host "Using Triton include: $includeDir"
          Write-Host "Using Triton lib: $($lib.FullName)"

          $shimDir = Join-Path $env:RUNNER_TEMP "triton-cmake"
          New-Item -ItemType Directory -Force $shimDir | Out-Null

          $cfgPath = Join-Path $shimDir "tritonConfig.cmake"

          $inc = $includeDir.Replace('\','/')
          $libPath = $lib.FullName.Replace('\','/')

          @"
          # Auto-generated Triton CMake package config (shim) for CI.
          set(triton_FOUND TRUE)

          if(NOT TARGET triton::triton)
            add_library(triton::triton UNKNOWN IMPORTED)
            set_target_properties(triton::triton PROPERTIES
              IMPORTED_LOCATION "$libPath"
              INTERFACE_INCLUDE_DIRECTORIES "$inc"
            )
          endif()
          "@ | Set-Content -Path $cfgPath -Encoding UTF8

          "triton_DIR=$($shimDir)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Conan profile detect
        shell: pwsh
        run: |
          conan profile detect --force

      - name: Conan install deps (fmt/range-v3/z3/capstone)
        shell: pwsh
        run: |
          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -b missing

      - name: Configure titan (CMake)
        shell: pwsh
        run: |
          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"

          $llvmDir = "$env:LLVM_DIR".Replace('\','/')
          $tritonDir = "$env:triton_DIR".Replace('\','/')

          cmake -S . -B $env:BUILD_DIR `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DCMAKE_PREFIX_PATH="$($conanGen.Path.Replace('\','/'))" `
            -DLLVM_DIR="$llvmDir" `
            -Dtriton_DIR="$tritonDir"

      - name: Build titan.exe
        shell: pwsh
        run: |
          cmake --build $env:BUILD_DIR --config Release --parallel

      - name: Generate vmprotect64.ll (intrinsics)
        shell: pwsh
        run: |
          $clang = Get-Command clang.exe -ErrorAction SilentlyContinue
          if (-not $clang) { throw "clang.exe not found in PATH" }

          Push-Location intrinsics
          & $clang.Source `
            -std=c++17 `
            -O3 `
            -Iremill/include `
            -Wno-gnu-inline-cpp-without-extern `
            -fno-discard-value-names `
            -fstrict-aliasing `
            -fno-slp-vectorize `
            -mllvm -enable-tbaa=true `
            -emit-llvm `
            -DADDRESS_SIZE_BITS=64 `
            -m64 `
            -S main.cpp `
            -o vmprotect64.ll
          Pop-Location

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
            intrinsics/vmprotect64.ll
