name: windows-llvm15-triton-headers-from-git

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_BIN_URL: https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z
      TRITON_BIN_DIR: ${{ github.workspace }}\_deps\triton-bin
      TRITON_SRC_DIR: ${{ github.workspace }}\_deps\triton-src
      TRITON_GEN_DIR: ${{ github.workspace }}\_deps\triton-generated

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 15 dev (conda-forge llvmdev)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "clang=15.*" "lld=15.*" zlib libxml2
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          test -n "${CONDA_PREFIX:-}"

      - name: Export LLVM_DIR and LLVM include dir (conda env)
        shell: pwsh
        run: |
          if (-not $env:CONDA_PREFIX) { throw "CONDA_PREFIX is not set" }

          $condaBin = Join-Path $env:CONDA_PREFIX "Library\bin"
          if (Test-Path $condaBin) {
            $condaBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          $cfg = Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) { throw "LLVMConfig.cmake not found under $env:CONDA_PREFIX" }
          "LLVM_DIR=$($cfg.Directory.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          $incCandidates = @(
            (Join-Path $env:CONDA_PREFIX "Library\include"),
            (Join-Path $env:CONDA_PREFIX "include")
          )
          $llvmInc = $incCandidates | Where-Object { Test-Path (Join-Path $_ "llvm\ADT\StringRef.h") } | Select-Object -First 1
          if (-not $llvmInc) { throw "LLVM include dir not found" }

          "LLVM_INCLUDE_DIR=$llvmInc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "LLVM_INCLUDE_DIR=$llvmInc"

      - name: Install tools (7zip)
        shell: pwsh
        run: |
          choco install -y 7zip

      - name: Download & extract Triton prebuilt (lib/bin)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "_deps" | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP "triton.7z"
          Invoke-WebRequest -Uri "${{ env.TRITON_BIN_URL }}" -OutFile $archive
          New-Item -ItemType Directory -Force "${{ env.TRITON_BIN_DIR }}" | Out-Null
          & 7z x $archive "-o${{ env.TRITON_BIN_DIR }}" -y

      - name: Clone Triton source (headers)
        shell: pwsh
        run: |
          if (Test-Path "${{ env.TRITON_SRC_DIR }}") { Remove-Item -Recurse -Force "${{ env.TRITON_SRC_DIR }}" }
          git clone --depth 1 https://github.com/JonathanSalwan/Triton "${{ env.TRITON_SRC_DIR }}"
          git -C "${{ env.TRITON_SRC_DIR }}" rev-parse HEAD

          $hdrRoot = Join-Path "${{ env.TRITON_SRC_DIR }}" "src\libtriton\includes"
          if (!(Test-Path (Join-Path $hdrRoot "triton"))) { throw "Expected headers not found under: $hdrRoot" }

      - name: Generate minimal triton/config.hpp (no Triton build)
        shell: pwsh
        run: |
          $genRoot = "${{ env.TRITON_GEN_DIR }}"
          $cfgDir = Join-Path $genRoot "triton"
          New-Item -ItemType Directory -Force $cfgDir | Out-Null

          $cfgPath = Join-Path $cfgDir "config.hpp"
          @"
          #ifndef TRITON_CONFIG_HPP
          #define TRITON_CONFIG_HPP
          #if defined(_WIN32) && defined(TRITON_SHARED)
          #  if defined(TRITON_BUILDING_SHARED)
          #    define TRITON_EXPORT __declspec(dllexport)
          #  else
          #    define TRITON_EXPORT __declspec(dllimport)
          #  endif
          #else
          #  define TRITON_EXPORT
          #endif
          #endif
          "@ | Set-Content -Path $cfgPath -Encoding UTF8

      - name: Generate tritonConfig.cmake shim (headers from git + generated config + lib from 7z)
        shell: pwsh
        run: |
          $srcRoot = "${{ env.TRITON_SRC_DIR }}"
          $binRoot = "${{ env.TRITON_BIN_DIR }}"
          $genRoot = "${{ env.TRITON_GEN_DIR }}"

          $includeGit = Join-Path $srcRoot "src\libtriton\includes"
          $includeGen = $genRoot

          $lib = Get-ChildItem -Path $binRoot -Recurse -Filter "triton*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $lib) { $lib = Get-ChildItem -Path $binRoot -Recurse -Filter "*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1 }
          if (-not $lib) { throw "No import library (.lib) found in Triton prebuilt archive." }

          $shimDir = Join-Path $env:RUNNER_TEMP "triton-cmake"
          New-Item -ItemType Directory -Force $shimDir | Out-Null

          $cfgPath = Join-Path $shimDir "tritonConfig.cmake"
          $inc1 = $includeGen.Replace('\','/')
          $inc2 = $includeGit.Replace('\','/')
          $libPath = $lib.FullName.Replace('\','/')

          @"
          set(triton_FOUND TRUE)
          if(NOT TARGET triton::triton)
            add_library(triton::triton UNKNOWN IMPORTED)
            set_target_properties(triton::triton PROPERTIES
              IMPORTED_LOCATION "$libPath"
              INTERFACE_INCLUDE_DIRECTORIES "$inc1;$inc2"
            )
          endif()
          "@ | Set-Content -Path $cfgPath -Encoding UTF8

          "triton_DIR=$($shimDir)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Conan profile detect
        shell: pwsh
        run: |
          conan profile detect --force

      - name: Conan install deps (fmt/range-v3/z3/capstone) + VirtualBuildEnv
        shell: pwsh
        run: |
          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -g CMakeDeps `
            -g CMakeToolchain `
            -g VirtualBuildEnv `
            -g VirtualRunEnv `
            -b missing

      - name: Locate conanbuild.bat
        shell: pwsh
        run: |
          $root = Resolve-Path "$env:BUILD_DIR\conan"
          $bat = Get-ChildItem -Path $root -Recurse -Filter "conanbuild.bat" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $bat) { throw "conanbuild.bat not found under $root" }
          "CONANBUILD_BAT=$($bat.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure titan (CMake) with conanbuild + LLVM INCLUDE
        shell: pwsh
        run: |
          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"

          $buildDir = $env:BUILD_DIR
          $prefixPath = $conanGen.Path
          $llvmDir = $env:LLVM_DIR
          $llvmInc = $env:LLVM_INCLUDE_DIR
          $tritonDir = $env:triton_DIR
          $conanBat = $env:CONANBUILD_BAT

          cmd /c "call `"$conanBat`" && set `"INCLUDE=$llvmInc;%INCLUDE%`" && cmake -S . -B `"$buildDir`" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=`"$toolchain`" -DCMAKE_PREFIX_PATH=`"$prefixPath`" -DLLVM_DIR=`"$llvmDir`" -Dtriton_DIR=`"$tritonDir`""

      - name: Build titan.exe (skip intrinsics on Windows) with conanbuild + LLVM INCLUDE
        shell: pwsh
        run: |
          $buildDir = $env:BUILD_DIR
          $llvmInc = $env:LLVM_INCLUDE_DIR
          $conanBat = $env:CONANBUILD_BAT

          cmd /c "call `"$conanBat`" && set `"INCLUDE=$llvmInc;%INCLUDE%`" && cmake --build `"$buildDir`" --config Release --target titan --parallel"
