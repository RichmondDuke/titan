name: windows-llvm15-triton-prebuilt

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_URL: https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z
      TRITON_DIR: ${{ github.workspace }}\_deps\triton

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 15 dev (conda-forge llvmdev)
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "clang=15.*" "lld=15.*"
          echo "CONDA_PREFIX=$CONDA_PREFIX"
          test -n "${CONDA_PREFIX:-}"

      - name: Export LLVM_DIR (find LLVMConfig.cmake in conda env)
        shell: pwsh
        run: |
          if (-not $env:CONDA_PREFIX) {
            throw "CONDA_PREFIX is not set (conda env not activated?)"
          }

          # Ensure conda LLVM tools (clang.exe etc.) are on PATH for later steps
          $condaBin = Join-Path $env:CONDA_PREFIX "Library\bin"
          if (Test-Path $condaBin) {
            $condaBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

          # Find LLVMConfig.cmake (llvmdev should provide it)
          $cfg = Get-ChildItem -Path $env:CONDA_PREFIX -Recurse -Filter "LLVMConfig.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cfg) {
            throw "LLVMConfig.cmake not found under $env:CONDA_PREFIX"
          }

          $llvmDir = $cfg.Directory.FullName
          Write-Host "Found LLVMConfig.cmake at: $($cfg.FullName)"
          "LLVM_DIR=$llvmDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install tools (7zip)
        shell: pwsh
        run: |
          choco install -y 7zip

      - name: Download & extract Triton prebuilt
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "_deps" | Out-Null
          $archive = Join-Path $env:RUNNER_TEMP "triton.7z"
          Invoke-WebRequest -Uri "${{ env.TRITON_URL }}" -OutFile $archive
          New-Item -ItemType Directory -Force "${{ env.TRITON_DIR }}" | Out-Null
          & 7z x $archive "-o${{ env.TRITON_DIR }}" -y

          Write-Host "Triton extracted to ${{ env.TRITON_DIR }}"
          Get-ChildItem -Recurse -Depth 3 "${{ env.TRITON_DIR }}" | Select-Object FullName

      - name: Generate tritonConfig.cmake shim (for prebuilt Triton)
        shell: pwsh
        run: |
          $tritonRoot = "${{ env.TRITON_DIR }}"
          if (!(Test-Path $tritonRoot)) { throw "TRITON_DIR does not exist: $tritonRoot" }

          # Best-effort locate include dir
          $includeDir = @(
            (Join-Path $tritonRoot "include"),
            (Join-Path $tritonRoot "triton\include")
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $includeDir) {
            # fallback: search for a directory that contains at least one header
            $includeDir = Get-ChildItem -Path $tritonRoot -Recurse -Directory -ErrorAction SilentlyContinue |
              Where-Object { Test-Path (Join-Path $_.FullName "triton") -or (Get-ChildItem $_.FullName -Filter *.h -ErrorAction SilentlyContinue | Select-Object -First 1) } |
              Select-Object -First 1 -ExpandProperty FullName
          }

          # Best-effort locate a library (Windows: .lib)
          $lib = Get-ChildItem -Path $tritonRoot -Recurse -Filter "triton*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $lib) {
            # Some packages may name it differently; just pick the first .lib as a last resort
            $lib = Get-ChildItem -Path $tritonRoot -Recurse -Filter "*.lib" -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          if (-not $includeDir) { throw "Could not locate Triton include directory under $tritonRoot" }
          if (-not $lib) { throw "Could not locate Triton .lib under $tritonRoot" }

          Write-Host "Using Triton include: $includeDir"
          Write-Host "Using Triton lib: $($lib.FullName)"

          $shimDir = Join-Path $env:RUNNER_TEMP "triton-cmake"
          New-Item -ItemType Directory -Force $shimDir | Out-Null

          $cfgPath = Join-Path $shimDir "tritonConfig.cmake"
          @"
          # Auto-generated Triton CMake package config (shim) for CI.
          # Allows: find_package(triton CONFIG REQUIRED)
          set(triton_FOUND TRUE)

          if(NOT TARGET triton::triton)
            add_library(triton::triton UNKNOWN IMPORTED)
            set_target_properties(triton::triton PROPERTIES
             IMPORTED_LOCATION "$($lib.FullName.Replace('\','/'))"
              INTERFACE_INCLUDE_DIRECTORIES "$($includeDir.Replace('\','/'))"
            )
          endif()
          "@ | Set-Content -Path $cfgPath -Encoding UTF8

          "triton_DIR=$($shimDir)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Exported triton_DIR=$shimDir"
          Write-Host "Generated $cfgPath"

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"

      - name: Conan profile detect
        shell: pwsh
        run: |
          conan profile detect --force

      - name: Conan install deps (fmt/range-v3/z3/capstone)
        shell: pwsh
        run: |
          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -b missing

      - name: Configure (CMake)
        shell: pwsh
        run: |
          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"

          # Use forward slashes for CMake list/path variables to avoid backslash escapes like \a, \t, etc.
          $tritonRoot = "${{ env.TRITON_DIR }}".Replace('\', '/')
          $llvmDir = "$env:LLVM_DIR".Replace('\', '/')
          $tritonDir = "$env:triton_DIR".Replace('\', '/')

          cmake -S . -B $env:BUILD_DIR `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DCMAKE_PREFIX_PATH="$($conanGen.Path.Replace('\','/'))" `
            -DTRITON_ROOT="$tritonRoot" `
            -Dtriton_DIR="$tritonDir" `
            -DLLVM_DIR="$llvmDir"

      - name: Build titan.exe
        shell: pwsh
        run: |
          cmake --build $env:BUILD_DIR --config Release --parallel

      - name: Generate vmprotect64.ll (intrinsics)
        shell: pwsh
        run: |
          $clang = Get-Command clang.exe -ErrorAction SilentlyContinue
          if (-not $clang) { throw "clang.exe not found in PATH" }

          Write-Host "Using clang: $($clang.Source)"

          Push-Location intrinsics
          & $clang.Source `
            -std=c++17 `
            -O3 `
            -Iremill/include `
            -Wno-gnu-inline-cpp-without-extern `
            -fno-discard-value-names `
            -fstrict-aliasing `
            -fno-slp-vectorize `
            -mllvm -enable-tbaa=true `
            -emit-llvm `
            -DADDRESS_SIZE_BITS=64 `
            -m64 `
            -S main.cpp `
            -o vmprotect64.ll
          Pop-Location

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
            intrinsics/vmprotect64.ll
