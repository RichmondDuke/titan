name: windows-llvm15-triton-build-from-source

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    env:
      BUILD_DIR: build
      TRITON_SRC_DIR: ${{ github.workspace }}\_deps\triton-src
      TRITON_DEPS_DIR: ${{ github.workspace }}\_deps\triton-deps
      Z3_VERSION: "4.12.2"

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSVC Dev Cmd
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup Miniconda (conda-forge)
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: llvm15
          python-version: "3.11"
          channels: conda-forge
          channel-priority: strict

      - name: Install LLVM 15 dev (conda-forge llvmdev) + ZLIB/LibXml2
        shell: bash -l {0}
        run: |
          set -euo pipefail
          conda info
          conda install -y "llvmdev=15.*" "lld=15.*" zlib libxml2 cmake ninja
          echo "$CONDA_PREFIX/Library/bin" >> "$GITHUB_PATH"
          LLVM_DIR="$CONDA_PREFIX/Library/lib/cmake/llvm"
          test -d "$LLVM_DIR"
          echo "LLVM_DIR=$LLVM_DIR" >> "$GITHUB_ENV"

      - name: Set TRITON_INSTALL_DIR
        shell: pwsh
        run: |
          "TRITON_INSTALL_DIR=$env:RUNNER_TEMP\triton-install" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Python (for Conan)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Conan 2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3.0"
          conan profile detect --force

      - name: Conan install Z3 for Triton (CMakeDeps)
        shell: pwsh
        run: |
          if (Test-Path "${{ env.TRITON_DEPS_DIR }}") { Remove-Item -Recurse -Force "${{ env.TRITON_DEPS_DIR }}" }

          conan install --requires="z3/${{ env.Z3_VERSION }}" `
            -of "${{ env.TRITON_DEPS_DIR }}" `
            -s build_type=Release `
            -g CMakeDeps `
            -b missing

          Write-Host "TRITON_DEPS_DIR listing:"
          Get-ChildItem -Force -Path "${{ env.TRITON_DEPS_DIR }}" | Select-Object FullName

          $gen = Join-Path "${{ env.TRITON_DEPS_DIR }}" "generators"
          if (!(Test-Path $gen)) { throw "Expected Conan generators dir not found: $gen" }
          Write-Host "Generators listing:"
          Get-ChildItem -Force -Path $gen | Select-Object FullName

      - name: Extract Z3 include/lib from Conan CMakeDeps data file
        shell: pwsh
        run: |
          $gen = Join-Path "${{ env.TRITON_DEPS_DIR }}" "generators"

          # Conan CMakeDeps emits *-data.cmake files; name depends on package naming.
          $data = Get-ChildItem -Path $gen -File -Filter "*z3*-data.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $data) { $data = Get-ChildItem -Path $gen -File -Filter "*Z3*-data.cmake" -ErrorAction SilentlyContinue | Select-Object -First 1 }
          if (-not $data) {
            Write-Host "No *z3*-data.cmake found. Showing generators files:"
            Get-ChildItem -Path $gen -File | Select-Object Name,FullName
            throw "z3 data file not found in Conan generators"
          }

          $txt = Get-Content $data.FullName -Raw
          Write-Host "Using data file: $($data.FullName)"

          function Get-CMakeSetValue([string]$name) {
            $m = [regex]::Match($txt, "set\(\s*$name\s+`"([^`"]*)`"\s*\)")
            if ($m.Success) { return $m.Groups[1].Value }
            return ""
          }

          # Try common variable spellings produced by CMakeDeps
          $incDirs = Get-CMakeSetValue "z3_INCLUDE_DIRS"
          if (-not $incDirs) { $incDirs = Get-CMakeSetValue "Z3_INCLUDE_DIRS" }

          $libDirs = Get-CMakeSetValue "z3_LIB_DIRS"
          if (-not $libDirs) { $libDirs = Get-CMakeSetValue "Z3_LIB_DIRS" }

          $libs = Get-CMakeSetValue "z3_LIBS"
          if (-not $libs) { $libs = Get-CMakeSetValue "Z3_LIBS" }

          if (-not $incDirs -or -not $libDirs -or -not $libs) {
            Write-Host "Failed to parse include/lib dirs/libs from data. Dumping first 2000 chars:"
            Write-Host ($txt.Substring(0, [Math]::Min($txt.Length, 2000)))
            throw "Could not parse z3 include/lib from Conan data file"
          }

          # Take first entry if semicolon-separated
          $inc = $incDirs.Split(';')[0]
          $libDir = $libDirs.Split(';')[0]
          $libName = $libs.Split(';')[0]

          # Convert library name to full path. On Windows it is usually 'z3' and the file is z3.lib
          $candidates = @(
            (Join-Path $libDir "$libName.lib"),
            (Join-Path $libDir "z3.lib"),
            (Join-Path $libDir "libz3.lib")
          )

          $libPath = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $libPath) {
            Write-Host "No expected lib found. Listing libDir:"
            Get-ChildItem -Path $libDir -Filter "*.lib" -ErrorAction SilentlyContinue | Select-Object FullName
            throw "Failed to locate z3 .lib under $libDir"
          }

          "Z3_INCLUDE_DIR=$inc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "Z3_LIBRARY=$libPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Z3_INCLUDE_DIR=$inc"
          Write-Host "Z3_LIBRARY=$libPath"

      - name: Conan install deps for titan (fmt/range-v3/z3/capstone)
        shell: pwsh
        run: |
          conan install . `
            -of "$env:BUILD_DIR\conan" `
            -s build_type=Release `
            -s compiler.cppstd=20 `
            -g CMakeDeps `
            -g CMakeToolchain `
            -b missing

      - name: Clone Triton source
        shell: pwsh
        run: |
          if (Test-Path "${{ env.TRITON_SRC_DIR }}") { Remove-Item -Recurse -Force "${{ env.TRITON_SRC_DIR }}" }
          git clone https://github.com/JonathanSalwan/Triton "${{ env.TRITON_SRC_DIR }}"
          git -C "${{ env.TRITON_SRC_DIR }}" checkout v0.9
          git -C "${{ env.TRITON_SRC_DIR }}" rev-parse HEAD

      - name: Configure Triton (MSVC only; explicit Z3 paths)
        shell: pwsh
        run: |
          $src = "${{ env.TRITON_SRC_DIR }}"
          $bld = "_deps\triton-build"
          $inst = "$env:TRITON_INSTALL_DIR"
          $llvm = "$env:LLVM_DIR"

          cmd /c "cmake -S `"$src`" -B `"$bld`" -G `"Visual Studio 17 2022`" -A x64 -DCMAKE_INSTALL_PREFIX=`"$inst`" -DLLVM_DIR=`"$llvm`" -DZ3_INCLUDE_DIR=`"$env:Z3_INCLUDE_DIR`" -DZ3_LIBRARY=`"$env:Z3_LIBRARY`" -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl"

      - name: Build & install Triton
        shell: pwsh
        run: |
          cmake --build "_deps\triton-build" --config Release --parallel
          cmake --install "_deps\triton-build" --config Release

      - name: Configure titan (CMake)
        shell: pwsh
        run: |
          $conanGen = Resolve-Path "$env:BUILD_DIR\conan\build\generators"
          $toolchain = Join-Path $conanGen "conan_toolchain.cmake"
          $prefixPath = "$($conanGen.Path);$env:CONDA_PREFIX\Library;$env:TRITON_INSTALL_DIR"

          cmake -S . -B "$env:BUILD_DIR" -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$toolchain" `
            -DCMAKE_PREFIX_PATH="$prefixPath" `
            -DLLVM_DIR="$env:LLVM_DIR" `
            -Dtriton_DIR="$env:TRITON_INSTALL_DIR\lib\cmake\triton" `
            -DTITAN_BUILD_INTRINSICS=OFF `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build titan.exe (Release)
        shell: pwsh
        run: |
          cmake --build "$env:BUILD_DIR" --config Release --target titan --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: titan-windows-release
          path: |
            build/titan.exe
            build/Release/titan.exe
