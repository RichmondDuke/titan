name: Build and Release Titan

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: titan-build-env
          # 核心：确保从 conda-forge 拉取预编译库
          channels: conda-forge,defaults

      - name: Install Dependencies (Conda)
        # 1. 强制锁定 LLVM 15
        # 2. 直接从 Conda 安装 libtriton（这是 Triton 的预编译二进制版本）
        run: |
          conda install -y cmake ninja llvmdev=15.0.7 clangdev=15.0.7 libtriton fmt zlib zstd range-v3 nlohmann_json
        shell: pwsh

      - name: Configure CMake
        run: |
          # 指向 Conda 环境中的 LLVM 配置文件路径
          $LLVM_PATH = "$env:CONDA_PREFIX/Library/lib/cmake/llvm"
          
          cmake -B build -S . -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:CONDA_PREFIX/Library" `
            -DLLVM_DIR=$LLVM_PATH `
            -DCMAKE_C_COMPILER="$env:CONDA_PREFIX/Library/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="$env:CONDA_PREFIX/Library/bin/clang++.exe"
        shell: pwsh

      - name: Build Project
        run: |
          # 运行时需要能找到 Conda 的 bin 目录下的 dll
          $env:PATH = "$env:CONDA_PREFIX/Library/bin;$env:PATH"
          cmake --build build --config Release
        shell: pwsh

      - name: Organize and Zip Artifacts
        run: |
          if (!(Test-Path dist)) { mkdir dist }
          
          # 复制生成的程序
          Get-ChildItem -Path build -Include *.exe, *.dll, *.sys -Recurse | Copy-Item -Destination dist\
          
          # 关键：从 Conda 环境中提取 Triton 运行所需的 DLL
          # Triton 在 Windows 上通常叫 triton.dll
          $TRITON_DLL = "$env:CONDA_PREFIX/Library/bin/triton.dll"
          if (Test-Path $TRITON_DLL) {
              Copy-Item $TRITON_DLL -Destination dist\
          }

          Compress-Archive -Path dist\* -DestinationPath titan-windows-x64.zip -Force
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-build
          name: Continuous Build (Latest)
          body: |
            Built with Pre-compiled Dependencies.
            - LLVM: 15.0.7 (via Conda)
            - Triton: via Conda-forge (libtriton)
          files: titan-windows-x64.zip
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
