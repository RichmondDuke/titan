name: Build and Release Titan

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: titan-build-env
          channels: conda-forge,defaults

      - name: Install Dependencies (Conda)
        run: |
          conda install -y cmake ninja llvmdev=15.0.7 clangdev=15.0.7 fmt zlib zstd range-v3 nlohmann_json
        shell: pwsh

      - name: Install Triton (vcpkg)
        run: |
          vcpkg install triton:x64-windows
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -B build -S . -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="$env:CONDA_PREFIX/Library" `
            -DCMAKE_C_COMPILER="$env:CONDA_PREFIX/Library/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="$env:CONDA_PREFIX/Library/bin/clang++.exe" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh

      - name: Build Project
        run: |
          $env:PATH = "$env:CONDA_PREFIX/Library/bin;$env:PATH"
          cmake --build build --config Release
        shell: pwsh

      - name: Organize and Zip Artifacts
        # 这一步会收集所有可执行文件、库文件和配置文件并打包
        run: |
          mkdir dist
          # 递归收集 exe, dll, sys 和 json 配置文件（根据需要增删后缀）
          Get-ChildItem -Path build -Include *.exe, *.dll, *.sys, *.json -Recurse | Copy-Item -Destination dist\
          # 将所有收集到的文件打成一个 zip 包
          Compress-Archive -Path dist\* -DestinationPath titan-windows-x64.zip
        shell: pwsh

      - name: Create Release and Upload Zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-build
          name: Continuous Build (Latest)
          body: |
            Automatically built from the latest commit.
            - Includes: Executables, DLLs, and required configs.
            - Toolchain: Clang 15.0.7 & Triton (vcpkg).
          files: titan-windows-x64.zip # 只上传这一个压缩包
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
