name: Build and Release Titan

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: titan-build-env
          channels: conda-forge,defaults

      - name: Install Dependencies (Conda)
        run: |
          conda install -y cmake ninja llvmdev=15.0.7 clangdev=15.0.7 fmt zlib zstd range-v3 nlohmann_json
        shell: pwsh

      - name: Download and Extract Triton (7z)
        run: |
          $URL = "https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z"
          Write-Host "Downloading Triton from $URL..."
          Invoke-WebRequest -Uri $URL -OutFile triton.7z
          
          # 使用系统自带的 7z 程序解压
          & "7z.exe" x triton.7z -o"triton-deps" -y
          
          # 验证解压后的内容（方便排查目录结构）
          ls triton-deps
        shell: pwsh

      - name: Configure CMake
        run: |
          $LLVM_PATH = "$env:CONDA_PREFIX/Library/lib/cmake/llvm"
          # 关键点：Triton 0.9 二进制包可能没有提供 CMake 配置文件
          # 我们直接把头文件和库文件的路径传给 CMake
          $TRITON_ROOT = "$env:GITHUB_WORKSPACE/triton-deps"
          
          cmake -B build -S . -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:CONDA_PREFIX/Library;$TRITON_ROOT" `
            -DLLVM_DIR=$LLVM_PATH `
            -DCMAKE_C_COMPILER="$env:CONDA_PREFIX/Library/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="$env:CONDA_PREFIX/Library/bin/clang++.exe" `
            -DTRITON_INCLUDE_DIRS="$TRITON_ROOT/include" `
            -DTRITON_LIBRARIES="$TRITON_ROOT/libs/triton.lib"
        shell: pwsh

      - name: Build Project
        run: |
          $env:PATH = "$env:CONDA_PREFIX/Library/bin;$env:GITHUB_WORKSPACE/triton-deps/bin;$env:PATH"
          cmake --build build --config Release
        shell: pwsh

      - name: Organize and Zip Artifacts
        run: |
          if (!(Test-Path dist)) { mkdir dist }
          Get-ChildItem -Path build -Include *.exe, *.dll, *.sys -Recurse | Copy-Item -Destination dist\
          # 尝试拷贝解压出来的 bin 目录下的 dll
          if (Test-Path "triton-deps/bin") {
            Get-ChildItem -Path "triton-deps/bin" -Include *.dll | Copy-Item -Destination dist\
          }
          Compress-Archive -Path dist\* -DestinationPath titan-windows-x64.zip -Force
        shell: pwsh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-build
          name: Continuous Build (Latest)
          files: titan-windows-x64.zip
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
