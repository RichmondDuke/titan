name: Build Titan (Windows)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: titan-build-env
          channels: conda-forge,defaults

      - name: Install Dependencies
        # 补全了 fmt。注：如果项目还需要 triton，conda-forge 也有提供。
        # 这里一次性安装所有 CMake 需要的开发组件
        run: |
          conda install -y cmake ninja llvmdev=15.0.7 clangdev=15.0.7 fmt
        shell: pwsh

      - name: Configure CMake
        # 通过 $env:CONDA_PREFIX 自动定位所有已安装库的路径
        run: |
          cmake -B build -S . -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:CONDA_PREFIX/Library" `
            -DCMAKE_C_COMPILER="$env:CONDA_PREFIX/Library/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="$env:CONDA_PREFIX/Library/bin/clang++.exe"
        shell: pwsh

      - name: Build Project
        # 确保环境变量里有 bin 目录，以便自定义脚本能找到 clang++
        run: |
          $env:PATH = "$env:CONDA_PREFIX/Library/bin;$env:PATH"
          cmake --build build --config Release
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Titan-Windows-Binary
          path: build/*.exe
