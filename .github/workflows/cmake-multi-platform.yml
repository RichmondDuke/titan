name: Build and Release Titan

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: titan-build-env
          # 增加 conda-forge 优先级
          channels: conda-forge,defaults

      - name: Install Dependencies (Conda)
        # 核心改动：不再锁死 15.0.7，改用最新的 llvmdev 和 clangdev (目前通常是 19.x)
        # 这将解决 "Unexpected compiler version" 的报错
        run: |
          conda install -y cmake ninja llvmdev clangdev fmt zlib zstd range-v3 nlohmann_json
        shell: pwsh

      - name: Install Triton (vcpkg)
        run: |
          vcpkg install triton:x64-windows
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -B build -S . -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="$env:CONDA_PREFIX/Library" `
            -DCMAKE_C_COMPILER="$env:CONDA_PREFIX/Library/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="$env:CONDA_PREFIX/Library/bin/clang++.exe" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh

      - name: Build Project
        run: |
          $env:PATH = "$env:CONDA_PREFIX/Library/bin;$env:PATH"
          cmake --build build --config Release
        shell: pwsh

      - name: Organize and Zip Artifacts
        run: |
          mkdir dist
          Get-ChildItem -Path build -Include *.exe, *.dll, *.sys, *.json -Recurse | Copy-Item -Destination dist\
          Compress-Archive -Path dist\* -DestinationPath titan-windows-x64.zip
        shell: pwsh

      - name: Create Release and Upload Zip
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-build
          name: Continuous Build (Latest)
          body: |
            Built with latest Clang compatible with MSVC STL.
            - Toolchain: Clang (Latest from Conda)
            - Dependencies: LLVM, Triton, Range-v3
          files: titan-windows-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
