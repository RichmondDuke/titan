name: Build and Release Titan

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: titan-build-env
          channels: conda-forge,defaults

      - name: Install Dependencies (Conda)
        run: |
          conda install -y cmake ninja llvmdev=15.0.7 clangdev=15.0.7 fmt zlib zstd range-v3 nlohmann_json
        shell: pwsh

      - name: Setup Triton SDK (v0.9 Binary + Headers Patch)
        shell: pwsh
        run: |
          # 1. 下载并解压
          $URL = "https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z"
          Invoke-WebRequest -Uri $URL -OutFile triton.7z
          & "7z.exe" x triton.7z -o"triton-sdk" -y

          # 2. 补全头文件
          git clone --depth 1 https://github.com/JonathanSalwan/Triton.git triton-src
          mkdir triton-sdk/include
          xcopy /E /I triton-src\src\libtriton\includes\* triton-sdk\include\

          # 3. 整理目录结构
          if (!(Test-Path "triton-sdk/lib")) { mkdir triton-sdk/lib }
          if (Test-Path "triton-sdk/triton.lib") { Move-Item "triton-sdk/triton.lib" "triton-sdk/lib/" -Force }
          
          if (!(Test-Path "triton-sdk/bin")) { mkdir triton-sdk/bin }
          if (Test-Path "triton-sdk/triton.dll") { Move-Item "triton-sdk/*.dll" "triton-sdk/bin/" -Force }

          # 4. 生成配置文件 (修正变量替换问题)
          $ABS_SDK_PATH = "$env:GITHUB_WORKSPACE/triton-sdk".Replace('\', '/')
          
          # 使用单引号包裹内容，手动插入解析后的路径变量
          $ConfigContent = "set(triton_INCLUDE_DIRS `"$ABS_SDK_PATH/include`")`n" +
                           "set(triton_LIBRARIES `"$ABS_SDK_PATH/lib/triton.lib`")`n" +
                           "set(triton_FOUND TRUE)`n" +
                           "if(NOT TARGET triton_imp)`n" +
                           "    add_library(triton_imp SHARED IMPORTED)`n" +
                           "    set_target_properties(triton_imp PROPERTIES `n" +
                           "        INTERFACE_INCLUDE_DIRECTORIES `"$ABS_SDK_PATH/include`" `n" +
                           "        IMPORTED_IMPLIB `"$ABS_SDK_PATH/lib/triton.lib`" `n" +
                           "        IMPORTED_LOCATION `"$ABS_SDK_PATH/bin/triton.dll`" `n" +
                           "    )`n" +
                           "endif()`n" +
                           "if(NOT TARGET triton::triton)`n" +
                           "    add_library(triton::triton ALIAS triton_imp)`n" +
                           "endif()`n" +
                           "if(NOT TARGET Triton::Triton)`n" +
                           "    add_library(Triton::Triton ALIAS triton_imp)`n" +
                           "endif()"
          
          if (!(Test-Path "triton-sdk/cmake")) { mkdir triton-sdk/cmake }
          $ConfigContent | Out-File -FilePath "triton-sdk/cmake/tritonConfig.cmake" -Encoding utf8

      - name: Configure CMake
        shell: pwsh
        run: |
          $LLVM_PATH = "$env:CONDA_PREFIX/Library/lib/cmake/llvm"
          # 确保路径使用正斜杠，CMake 在 Windows 上处理反斜杠有时会出问题
          $TRITON_CMAKE_DIR = "$env:GITHUB_WORKSPACE/triton-sdk/cmake".Replace('\', '/')
          
          cmake -B build -S . -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:CONDA_PREFIX/Library;$TRITON_CMAKE_DIR" `
            -DLLVM_DIR="$LLVM_PATH" `
            -Dtriton_DIR="$TRITON_CMAKE_DIR" `
            -DCMAKE_C_COMPILER="$env:CONDA_PREFIX/Library/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="$env:CONDA_PREFIX/Library/bin/clang++.exe"

      - name: Build Project
        shell: pwsh
        run: |
          $env:PATH = "$env:CONDA_PREFIX/Library/bin;$env:GITHUB_WORKSPACE/triton-sdk/bin;$env:PATH"
          cmake --build build --config Release

      - name: Organize and Zip Artifacts
        shell: pwsh
        run: |
          if (!(Test-Path dist)) { mkdir dist }
          Get-ChildItem -Path build -Include *.exe, *.dll, *.sys -Recurse | Copy-Item -Destination dist\
          if (Test-Path "triton-sdk/bin") {
            Copy-Item "triton-sdk/bin/*.dll" -Destination dist\
          }
          Compress-Archive -Path dist\* -DestinationPath titan-windows-x64.zip -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-build
          name: Continuous Build (Latest)
          files: titan-windows-x64.zip
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
