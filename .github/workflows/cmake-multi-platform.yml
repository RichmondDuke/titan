name: Build and Release Titan (Deep Patch)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: titan-build-env
          channels: conda-forge,defaults

      - name: Install Compilers & Toolchain
        run: |
          # 核心：必须锁定 llvm/clang 15 以匹配 Triton v0.9 的 ABI
          conda install -y cmake ninja llvmdev=15.0.7 clangdev=15.0.7 fmt zlib zstd range-v3 nlohmann_json
        shell: pwsh

      - name: Physically Patch Clang (The "Nuke" Strategy)
        shell: pwsh
        run: |
          # 找到 Conda 环境中真实的编译器位置
          $CLANG_DIR = "$env:CONDA_PREFIX/Library/bin"
          $REAL_CLANG_CPP = "$CLANG_DIR/clang++.exe"
          $REAL_CLANG_C = "$CLANG_DIR/clang.exe"
          
          # 将原程序重命名为 -real.exe
          Move-Item $REAL_CLANG_CPP "$CLANG_DIR/clang++-real.exe" -Force
          Move-Item $REAL_CLANG_C "$CLANG_DIR/clang-real.exe" -Force

          # 创建物理代理 Batch 文件，强制注入所有“免死金牌”参数
          # -mlong-double-80: 解决 Remill float80 长度断言错误
          # -D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH: 解决 MSVC 14.44 的版本霸凌
          # -fms-compatibility: 解决 __cpuid 宏定义冲突
          $WrapperCPP = @"
          @echo off
          "$CLANG_DIR/clang++-real.exe" -mlong-double-80 -D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH -fms-compatibility -fms-extensions %*
          "@
          $WrapperC = @"
          @echo off
          "$CLANG_DIR/clang-real.exe" -mlong-double-80 -D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH -fms-compatibility -fms-extensions %*
          "@

          $WrapperCPP | Set-Content -Path "$CLANG_DIR/clang++.bat" -Encoding Ascii
          $WrapperC | Set-Content -Path "$CLANG_DIR/clang.bat" -Encoding Ascii
          
          # 在 Windows 下，cmd.exe 调用 'clang++' 会优先匹配 .bat（如果当前目录下没有 .exe）
          # 为保险起见，我们做一个带 .exe 后缀的硬链接/拷贝（如果系统支持脚本作为入口）
          # 但最稳妥的是直接让 PATH 优先寻找我们的 bat
          Write-Host "Clang physically patched in $CLANG_DIR"

      - name: Setup Z3 (v4.8.10 - ABI Stable)
        shell: pwsh
        run: |
          $URL = "https://github.com/Z3Prover/z3/releases/download/z3-4.8.10/z3-4.8.10-x64-win.zip"
          Invoke-WebRequest -Uri $URL -OutFile z3.zip
          Expand-Archive -Path z3.zip -DestinationPath . -Force
          Rename-Item -Path "z3-4.8.10-x64-win" -NewName "z3-sdk"

      - name: Setup Triton SDK (v0.9 Patch)
        shell: pwsh
        run: |
          $URL = "https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z"
          Invoke-WebRequest -Uri $URL -OutFile triton.7z
          & "7z.exe" x triton.7z -o"triton-sdk" -y
          git clone --depth 1 https://github.com/JonathanSalwan/Triton.git triton-src
          xcopy /E /I /Y triton-src\src\libtriton\includes\triton\* triton-sdk\include\triton\
          
          # 强制写入兼容性 config.hpp
          $Config = "#ifndef TRITON_CONFIG_HPP`n#define TRITON_CONFIG_HPP`n#define TRITON_Z3_INTERFACE`n#endif"
          $Config | Set-Content -Path "triton-sdk/include/triton/config.hpp" -Encoding UTF8
          
          if (!(Test-Path "triton-sdk/lib")) { mkdir triton-sdk/lib }
          Move-Item "triton-sdk/triton.lib" "triton-sdk/lib/" -ErrorAction SilentlyContinue

      - name: Configure CMake
        shell: pwsh
        run: |
          $Z3_INC = "$env:GITHUB_WORKSPACE\z3-sdk\include"
          $Z3_LIB = "$env:GITHUB_WORKSPACE/z3-sdk/bin/libz3.lib".Replace('\', '/')
          $ABS_SDK = "$env:GITHUB_WORKSPACE/triton-sdk".Replace('\', '/')

          $cmakeArgs = @(
            "-B", "build",
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DCMAKE_PREFIX_PATH=$env:CONDA_PREFIX/Library",
            "-DCMAKE_C_COMPILER=$env:CONDA_PREFIX/Library/bin/clang.bat",
            "-DCMAKE_CXX_COMPILER=$env:CONDA_PREFIX/Library/bin/clang++.bat",
            "-Dtriton_INCLUDE_DIRS=$ABS_SDK/include",
            "-Dtriton_LIBRARIES=$ABS_SDK/lib/triton.lib",
            "-DCMAKE_EXE_LINKER_FLAGS=$Z3_LIB",
            "-DCMAKE_CXX_FLAGS=-I`"$Z3_INC`""
          )
          & cmake @cmakeArgs

      - name: Build Project
        shell: pwsh
        run: |
          # 注入运行时 PATH，确保编译生成的测试程序能跑起来
          $env:PATH = "$env:CONDA_PREFIX/Library/bin;$env:GITHUB_WORKSPACE/triton-sdk/bin;$env:GITHUB_WORKSPACE/z3-sdk/bin;$env:PATH"
          cmake --build build --config Release

      - name: Organize and Zip Artifacts
        shell: pwsh
        run: |
          if (!(Test-Path dist)) { mkdir dist }
          Get-ChildItem -Path build -Include *.exe, *.dll -Recurse | Copy-Item -Destination dist\
          Copy-Item "triton-sdk/*.dll" -Destination dist\ -ErrorAction SilentlyContinue
          Copy-Item "z3-sdk/bin/*.dll" -Destination dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath titan-windows-x64.zip -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-build
          name: Continuous Build (Latest)
          files: titan-windows-x64.zip
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
