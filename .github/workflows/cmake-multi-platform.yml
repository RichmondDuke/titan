name: Build and Release Titan (Deep Patch)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: titan-build-env
          channels: conda-forge,defaults

      - name: Install Compilers & Toolchain
        run: |
          # 核心：必须锁定 llvm/clang 15 以匹配 Triton v0.9 的 ABI
          conda install -y cmake ninja llvmdev=15.0.7 clangdev=15.0.7 fmt zlib zstd range-v3 nlohmann_json
        shell: pwsh

      - name: Hard Patch Clang (The Destroyer Strategy)
        shell: pwsh
        run: |
          $CLANG_BIN = "$env:CONDA_PREFIX/Library/bin"
          
          # 1. 彻底把原先的 .exe 挪走，确保 PATH 里找不到 clang++.exe
          if (Test-Path "$CLANG_BIN/clang++.exe") {
              Move-Item "$CLANG_BIN/clang++.exe" "$CLANG_BIN/clang++-real.exe" -Force
          }
          if (Test-Path "$CLANG_BIN/clang.exe") {
              Move-Item "$CLANG_BIN/clang.exe" "$CLANG_BIN/clang-real.exe" -Force
          }

          # 2. 创建一个 python 包装器（Python 在 Windows Actions 里极其稳定且执行优先级高）
          $PyWrapper = @"
          import sys, subprocess
          # 强制注入参数
          extra_args = [
              '-mlong-double-80', 
              '-D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH', 
              '-fms-compatibility', 
              '-fms-extensions'
          ]
          real_clang = r'$CLANG_BIN/clang++-real.exe'
          subprocess.run([real_clang] + extra_args + sys.argv[1:], check=True)
          "@
          $PyWrapper | Set-Content "$CLANG_BIN/clang_wrapper.py"

          # 3. 创建执行入口，这次我们直接生成 .exe（利用 PowerShell 的编译能力）
          # 或者最简单的，创建一个 clang++.exe 的别名
          # 这里推荐用简单的 .bat，但我们要确保删除所有干扰项
          "@echo off`npython `"$CLANG_BIN/clang_wrapper.py`" %*" | Set-Content "$CLANG_BIN/clang++.bat"
          "@echo off`npython `"$CLANG_BIN/clang_wrapper.py`" %*" | Set-Content "$CLANG_BIN/clang.bat"
          
          # 关键点：将环境里的 clang++.exe 占位，防止其他工具重新生成它
          "Fake" | Set-Content "$CLANG_BIN/clang++.exe" -ErrorAction SilentlyContinue

      - name: Setup Z3 (v4.8.10 - ABI Stable)
        shell: pwsh
        run: |
          $URL = "https://github.com/Z3Prover/z3/releases/download/z3-4.8.10/z3-4.8.10-x64-win.zip"
          Invoke-WebRequest -Uri $URL -OutFile z3.zip
          Expand-Archive -Path z3.zip -DestinationPath . -Force
          Rename-Item -Path "z3-4.8.10-x64-win" -NewName "z3-sdk"

      - name: Setup Triton SDK (v0.9 & Fix CMake Config)
        shell: pwsh
        run: |
          # 1. 下载并解压
          $URL = "https://github.com/JonathanSalwan/Triton/releases/download/v0.9/triton-x64-vs2019-py37.release.7z"
          Invoke-WebRequest -Uri $URL -OutFile triton.7z
          & "7z.exe" x triton.7z -o"triton-sdk" -y
          
          # 2. 补全头文件 (Triton 预编译包经常缺东西)
          git clone --depth 1 https://github.com/JonathanSalwan/Triton.git triton-src
          xcopy /E /I /Y triton-src\src\libtriton\includes\triton\* triton-sdk\include\triton\

          # 3. 物理调整目录结构以符合常规逻辑
          if (!(Test-Path "triton-sdk/lib")) { mkdir triton-sdk/lib }
          if (Test-Path "triton-sdk/triton.lib") { Move-Item "triton-sdk/triton.lib" "triton-sdk/lib/" }
          if (Test-Path "triton-sdk/triton.dll") { Move-Item "triton-sdk/triton.dll" "triton-sdk/lib/" }

          # 4. 【核心修复】手动生成 tritonConfig.cmake
          $ABS_PATH = "$env:GITHUB_WORKSPACE/triton-sdk".Replace('\', '/')
          $ConfigContent = @"
          set(triton_INCLUDE_DIRS "$ABS_PATH/include")
          set(triton_LIBRARIES "$ABS_PATH/lib/triton.lib")
          set(triton_FOUND TRUE)
          add_library(triton SHARED IMPORTED)
          set_target_properties(triton PROPERTIES
            INTERFACE_INCLUDE_DIRECTORIES "`${triton_INCLUDE_DIRS}"
            IMPORTED_IMPLIB "`${triton_LIBRARIES}"
            IMPORTED_LOCATION "$ABS_PATH/lib/triton.dll"
          )
          # 兼容 titan 可能使用的不同变量名
          set(TRITON_INCLUDE_DIRS "`${triton_INCLUDE_DIRS}")
          set(TRITON_LIBRARIES triton)
          "@
          $ConfigContent | Set-Content -Path "triton-sdk/tritonConfig.cmake" -Encoding UTF8
          
          # 5. 写入兼容性头文件
          $ConfigHpp = "#ifndef TRITON_CONFIG_HPP`n#define TRITON_CONFIG_HPP`n#define TRITON_Z3_INTERFACE`n#endif"
          $ConfigHpp | Set-Content -Path "triton-sdk/include/triton/config.hpp" -Encoding UTF8

      - name: Configure CMake
        shell: pwsh
        run: |
          $Z3_INC = "$env:GITHUB_WORKSPACE\z3-sdk\include"
          $Z3_LIB = "$env:GITHUB_WORKSPACE/z3-sdk/bin/libz3.lib".Replace('\', '/')
          $TRITON_DIR = "$env:GITHUB_WORKSPACE/triton-sdk".Replace('\', '/')

          $cmakeArgs = @(
            "-B", "build",
            "-G", "Ninja",
            "-DCMAKE_BUILD_TYPE=Release",
            "-DCMAKE_PREFIX_PATH=$env:CONDA_PREFIX/Library",
            "-DCMAKE_C_COMPILER=$env:CONDA_PREFIX/Library/bin/clang.bat",
            "-DCMAKE_CXX_COMPILER=$env:CONDA_PREFIX/Library/bin/clang++.bat",
            # 指向我们刚刚创建 Config 文件的目录
            "-Dtriton_DIR=$TRITON_DIR", 
            "-DCMAKE_EXE_LINKER_FLAGS=$Z3_LIB",
            "-DCMAKE_CXX_FLAGS=-I`"$Z3_INC`""
          )
          & cmake @cmakeArgs

      - name: Build Project
        shell: pwsh
        run: |
          # 注入运行时 PATH，确保编译生成的测试程序能跑起来
          $env:PATH = "$env:CONDA_PREFIX/Library/bin;$env:GITHUB_WORKSPACE/triton-sdk/bin;$env:GITHUB_WORKSPACE/z3-sdk/bin;$env:PATH"
          cmake --build build --config Release

      - name: Organize and Zip Artifacts
        shell: pwsh
        run: |
          if (!(Test-Path dist)) { mkdir dist }
          Get-ChildItem -Path build -Include *.exe, *.dll -Recurse | Copy-Item -Destination dist\
          Copy-Item "triton-sdk/*.dll" -Destination dist\ -ErrorAction SilentlyContinue
          Copy-Item "z3-sdk/bin/*.dll" -Destination dist\ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist\* -DestinationPath titan-windows-x64.zip -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous-build
          name: Continuous Build (Latest)
          files: titan-windows-x64.zip
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
