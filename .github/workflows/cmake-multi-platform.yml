name: Build Titan (Windows)

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Conda Environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: titan-build-env
          channels: conda-forge,defaults

      - name: Install Base Dependencies via Conda
        # 安装 LLVM, Clang, fmt 和 zlib
        run: |
          conda install -y cmake ninja llvmdev=15.0.7 clangdev=15.0.7 fmt zlib
        shell: pwsh

      - name: Install Triton via vcpkg
        # 使用 vcpkg 专门安装 triton，这是最稳妥获取 tritonConfig.cmake 的方式
        run: |
          vcpkg install triton:x64-windows
        shell: pwsh

      - name: Configure CMake
        # 同时引用 Conda 和 vcpkg 的路径
        run: |
          cmake -B build -S . -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_PREFIX_PATH="$env:CONDA_PREFIX/Library" `
            -DCMAKE_C_COMPILER="$env:CONDA_PREFIX/Library/bin/clang.exe" `
            -DCMAKE_CXX_COMPILER="$env:CONDA_PREFIX/Library/bin/clang++.exe" `
            -DVCPKG_TARGET_TRIPLET=x64-windows
        shell: pwsh

      - name: Build Project
        run: |
          $env:PATH = "$env:CONDA_PREFIX/Library/bin;$env:PATH"
          cmake --build build --config Release
        shell: pwsh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Titan-Windows-Binary
          path: |
            build/*.exe
            build/**/*.exe
